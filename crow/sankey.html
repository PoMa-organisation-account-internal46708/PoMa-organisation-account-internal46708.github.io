const svg    = document.getElementById("svg");

let selectedCluster = null;

const LABEL_RIGHT = 200 - 8;
const LABEL_MAX_W = 200 - 8;
const CHAR_W  = 6.2;
const MAX_CHARS = Math.floor(LABEL_MAX_W / CHAR_W);


const X1 = 200, X2 = 580, X3 = 960;

function el(t) {
  return document.createElementNS("http://www.w3.org/2000/svg", t);
}

function find(nodes, name) {
  return nodes.find(d => d.name === name);
}

/* =========================
   POPUP
   ========================= */
function showPopup(clusterCode, svgRect) {
  const name  = clusterNames[clusterCode]  || clusterCode;
  const expl  = clusterExpl[clusterCode]   || "";
  const data  = clusterPopup[clusterCode]  || {};
  const types = (data.types || []);
  const clusterColor = colors[clusterCode] || "#333";

  const typeItems = types.map(t => "<li>" + t + "</li>").join("");

  popup.innerHTML =
    "<h3>" + name + "</h3>" +
    "<div class='explanation'>" + expl + "</div>" +
    "<div class='stat'><b>Behoeften:</b> " + (data.n_behoeften || 0) + "</div>" +
    "<div class='stat'><b>Documenten:</b> " + (data.n_docs || 0) + "</div>" +
    (types.length
      ? "<div class='stat'><b>Type Behoeften:</b><ul class='type-list'>" + typeItems + "</ul></div>"
      : "");
  popup.style.border = "2px solid " + clusterColor;
  popup.style.background = clusterColor + "10";

  // position popup to the left of the SVG element, aligned to click y
  const svgEl   = document.getElementById("svg");
  const svgBox  = svgEl.getBoundingClientRect();

  // top of popup = centre of the clicked node rect, clamped to viewport
  const nodeScreenY = svgBox.top + svgRect.top * (svgBox.height / H);
  const popupTop = Math.min(
    nodeScreenY,
    window.innerHeight - popup.offsetHeight - 8
  );

  popup.style.left = (svgBox.left + -300) + "px";
  popup.style.top  = (svgBox.top + 10) + "px";
  popup.style.display = "block";
}

function hidePopup() {
  popup.style.display = "none";
}

/* =========================
   HIGHLIGHT / RESET
   ========================= */
const clLinkEls = [];
const lgLinkEls = [];
const nodeEls   = {};

function highlightCluster(clusterName) {
  const activeLongs = new Set(
    linksCL.filter(l => l.source === clusterName).map(l => l.target)
  );
  const activeGemeentes = new Set(
    linksLG.filter(l => activeLongs.has(l.source)).map(l => l.target)
  );
  clLinkEls.forEach((p, i) => {
    p.setAttribute("stroke-opacity", linksCL[i].source === clusterName ? 0.75 : 0.05);
  });
  lgLinkEls.forEach((p, i) => {
    p.setAttribute("stroke-opacity", activeLongs.has(linksLG[i].source) ? 0.75 : 0.05);
  });
  Object.entries(nodeEls).forEach(([name, rect]) => {
    const active = name === clusterName || activeLongs.has(name) || activeGemeentes.has(name);
    rect.setAttribute("opacity", active ? 1 : 0.1);
  });
}

function resetHighlight() {
  clLinkEls.forEach(p => p.setAttribute("stroke-opacity", 0.35));
  lgLinkEls.forEach(p => p.setAttribute("stroke-opacity", 0.35));
  Object.values(nodeEls).forEach(r => r.setAttribute("opacity", 1));
}

/* ADDED - override wrapper, original function stays untouched */
const _resetHighlight = resetHighlight;

resetHighlight = function() {
  if (selectedCluster) {
    highlightCluster(selectedCluster);
    return;
  }
  _resetHighlight();
};

/* =========================
   OFFSETS
   ========================= */
const offsetOut = {};
const offsetIn  = {};

function initOffsets(nodeList) {
  nodeList.forEach(n => {
    offsetOut[n.name] = 0;
    offsetIn[n.name]  = 0;
  });
}

initOffsets(clusters);
initOffsets(longs);
initOffsets(gemeentes);

function totalOut(links, src) {
  return links.filter(l => l.source === src).reduce((s, l) => s + l.value, 0);
}
function totalIn(links, tgt) {
  return links.filter(l => l.target === tgt).reduce((s, l) => s + l.value, 0);
}

/* =========================
   TEXT WRAP
   ========================= */
function wrapText(text) {
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for (const w of words) {
    const candidate = line ? line + " " + w : w;
    if (candidate.length > MAX_CHARS && line) {
      lines.push(line);
      line = w;
    } else {
      line = candidate;
    }
  }
  if (line) lines.push(line);
  return lines;
}

/* =========================
   LINK DRAWING
   ========================= */
function drawLink(x1, s, x2, t, val, totS, totT, color, store) {
  const thickness = Math.max(1, Math.sqrt(val));
  const srcH = s.h * (val / (totS || 1));
  const tgtH = t.h * (val / (totT || 1));
  const y1 = s.y + offsetOut[s.name] + srcH / 2;
  const y2 = t.y + offsetIn[t.name]  + tgtH / 2;
  offsetOut[s.name] += srcH;
  offsetIn[t.name]  += tgtH;

  const p = el("path");
  const mx = (x1 + x2) / 2;
  const d = "M" + x1 + "," + y1 +
            " C" + mx + "," + y1 +
            " " + mx + "," + y2 +
            " " + x2 + "," + y2;
  p.setAttribute("d", d);
  p.setAttribute("stroke", color);
  p.setAttribute("stroke-width", thickness);
  p.setAttribute("fill", "none");
  p.setAttribute("stroke-opacity", 0.35);
  p.setAttribute("class", "link");
  svg.appendChild(p);
  store.push(p);
}

/* =========================
   NODE DRAWING
   ========================= */
function drawHeader(x, label) {
  const t = el("text");
  t.setAttribute("x", x + NODE_W / 2);
  t.setAttribute("y", HEADER_H - 8);
  t.setAttribute("text-anchor", "middle");
  t.setAttribute("class", "col-header");
  t.textContent = label;
  svg.appendChild(t);
}

function drawClusterNode(n) {
  const r = el("rect");
  r.setAttribute("x", n.x);
  r.setAttribute("y", n.y);
  r.setAttribute("width", NODE_W);
  r.setAttribute("height", n.h);
  r.setAttribute("fill", colors[n.name] || "#999");
  r.setAttribute("rx", 2);
  r.setAttribute("class", "node");

  r.addEventListener("mouseover", () => highlightCluster(n.name));
  r.addEventListener("mouseout",  () => { resetHighlight(); });
  r.addEventListener("click", (e) => {
    e.stopPropagation();
    showPopup(n.name, n);
  });
  r.addEventListener("click", (e) => {
    e.stopPropagation();
    showPopup(n.name, n);

    /* ADDED */
    selectedCluster = n.name;
    highlightCluster(n.name);
  });

  svg.appendChild(r);
  nodeEls[n.name] = r;

  const fullLabel = clusterNames[n.name] || n.name;
  const lines = wrapText(fullLabel);
  const lineH = 12;
  const totalTextH = lines.length * lineH;
  const startY = n.y + n.h / 2 - totalTextH / 2 + lineH * 0.75;

  lines.forEach((line, i) => {
    const t = el("text");
    t.setAttribute("x", LABEL_RIGHT);
    t.setAttribute("y", startY + i * lineH);
    t.setAttribute("class", "label");
    t.setAttribute("text-anchor", "end");
    t.textContent = line;
    svg.appendChild(t);
  });
}

function drawLongNode(n) {
  const r = el("rect");
  r.setAttribute("x", n.x);
  r.setAttribute("y", n.y);
  r.setAttribute("width", NODE_W);
  r.setAttribute("height", n.h);
  r.setAttribute("fill", "#B0B0B0");
  r.setAttribute("rx", 2);
  r.setAttribute("class", "node");
  svg.appendChild(r);
  nodeEls[n.name] = r;
}

function drawGemeenteNode(n) {
  const r = el("rect");
  r.setAttribute("x", n.x);
  r.setAttribute("y", n.y);
  r.setAttribute("width", NODE_W);
  r.setAttribute("height", n.h);
  r.setAttribute("fill", "#D0D0D0");
  r.setAttribute("rx", 2);
  r.setAttribute("class", "node");
  svg.appendChild(r);
  nodeEls[n.name] = r;

  const t = el("text");
  t.setAttribute("x", n.x + 28);
  t.setAttribute("y", n.y + n.h / 2 + 4);
  t.setAttribute("class", "label");
  t.textContent = n.name;
  svg.appendChild(t);
}

/* =========================
   RENDER
   ========================= */
drawHeader(X1, "Clusters");
drawHeader(X2, "Behoeften Long List");
drawHeader(X3, "Gemeenten");

clusters.forEach(n  => drawClusterNode(n));
longs.forEach(n     => drawLongNode(n));
gemeentes.forEach(n => drawGemeenteNode(n));

linksCL.forEach(l => {
  const s = find(clusters, l.source);
  const t = find(longs,    l.target);
  if (!s || !t) return;
  drawLink(s.x + NODE_W, s, t.x, t, l.value,
    totalOut(linksCL, s.name), totalIn(linksCL, t.name),
    colors[s.name] || "#999", clLinkEls);
});

linksLG.forEach(l => {
  const s = find(longs,     l.source);
  const t = find(gemeentes, l.target);
  if (!s || !t) return;
  drawLink(s.x + NODE_W, s, t.x, t, l.value,
    totalOut(linksLG, s.name), totalIn(linksLG, t.name),
    colors[longToCluster[s.name]] || "#777", lgLinkEls);
});

// click anywhere else to close popup
document.addEventListener("click", () => {
  selectedCluster = null;
  hidePopup();
  resetHighlight();
});
