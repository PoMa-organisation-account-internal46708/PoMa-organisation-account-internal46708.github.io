const clusterExpl    = {"C1": "Het waarborgen van toegang voor mensen die afhankelijk zijn van zorg aan huis, doelgroepenvervoer of fysieke ondersteuning bij verplaatsing. De rechtvaardiging is inclusief: een beleid dat mensen met een beperking of zorgbehoefte uitsluit van hun eigen buurt, is maatschappelijk onacceptabel en juridisch kwetsbaar. De uitdaging zit in de definitie van de doelgroep \u2014 zorgverlener, mantelzorger, cli\u00ebnt, leverancier van medische hulpmiddelen \u2014 en in de vraag hoe ontheffingen worden georganiseerd zonder dat het systeem volloopt met uitzonderingen.", "C2": "Het garanderen van snelle en ongehinderde doorgang voor brandweer, politie en ambulances, ook in gebieden met fysieke afsluitingen of camerasystemen. Dit klinkt vanzelfsprekend maar vraagt om concrete technische en organisatorische afspraken: wie beheert de toegangssystemen, wie heeft autorisatie om ze te openen, hoe snel reageert het systeem en wat gebeurt er als de verbinding wegvalt?", "C3": "Het weren van sluipverkeer en wijkvreemd verkeer uit woonstraten en -buurten. De maatregel is niet bedoeld om bewoners op te sluiten, maar om de straat terug te geven aan de mensen die er wonen. De afweging zit in de definitie van 'wijkvreemd': wie hoort er wel en wie niet, en hoe wordt dat handhaafbaar gemaakt zonder dat bewoners zelf de dupe worden van hun eigen maatregel?", "C4": "Het beschermen van voetgangers, fietsers en kinderen door gemotoriseerd verkeer te weren of te beperken op plekken waar die groepen dominant aanwezig zijn. Schoolstraten, fietsroutes, verblijfspleinen. De rechtvaardiging is sterk: kwetsbare verkeersdeelnemers kunnen zichzelf niet beschermen tegen snelheid en massa. Maar de maatregel vraagt om tijdgebonden of situatiegebonden logica \u2014 een schoolstraat is niet de hele dag een schoolstraat.", "C5": "Het sturen van bevoorrading via zero-emissiezones en geconsolideerde hubs, zodat de luchtkwaliteit in drukke verblijfsgebieden verbetert en het aantal vra const LABEL_MAX_W = 150;
const CHAR_W  = 6.2;
const MAX_CHARS = Math.floor(LABEL_MAX_W / CHAR_W);


const X1 = 550, X2 = 800, X3 = 1050;

function el(t) {
  return document.createElementNS("http://www.w3.org/2000/svg", t);
}

function find(nodes, name) {
  return nodes.find(d => d.name === name);
}

/* =========================
   POPUP
   ========================= */
function showPopup(clusterCode, svgRect) {
  const name = (clusterNames[clusterCode] || clusterCode)
  .replace(/^Cluster\s*\d+\s*[:.-]?\s*/i, "")
  .trim();
  const expl  = clusterExpl[clusterCode]   || "";
  const data  = clusterPopupData[clusterCode]  || {};
  const types = (data.types || []);
  const clusterColor = colors[clusterCode] || "#333";

  const typeItems = types.map(t => "<li>" + t + "</li>").join("");

  clusterPopup.innerHTML =
    "<h3>" + name + "</h3>" +
    "<div class='explanation'>" + expl + "</div>" +
    "<div class='stat'><b>Behoeften:</b> " + (data.n_behoeften || 0) + "</div>" +
    "<div class='stat'><b>Documenten:</b> " + (data.n_docs || 0) + "</div>" +
    (types.length
      ? "<div class='stat'><b>Type Behoeften:</b><ul class='type-list'>" + typeItems + "</ul></div>"
      : "");

  clusterPopup.style.border = "2px solid " + clusterColor;
  clusterPopup.style.background = clusterColor + "10";

  const svgEl  = document.getElementById("svg");
  const svgBox = svgEl.getBoundingClientRect();

  clusterPopup.style.left = (svgBox.left - 50) + "px";
  clusterPopup.style.top  = (svgBox.top + 10) + "px";
  clusterPopup.style.display = "block";
}

function showClusterPlaceholder() {
  clusterPopup.innerHTML =
    "<h3>Klik op een cluster voor meer informatie</h3>" ;

  clusterPopup.style.border = "2px solid #540932";
  clusterPopup.style.background = "#ffffff";

  const svgEl  = document.getElementById("svg");
  const svgBox = svgEl.getBoundingClientRect();

  clusterPopup.style.left = (svgBox.left - 50) + "px";
  clusterPopup.style.top  = (svgBox.top + 10) + "px";
  clusterPopup.style.display = "block";
}

function showTooltip(text, x, y, color = "#333") {
  hoverPopup.innerHTML =
    "<div style='color:" + color + "; font-weight:600'>" +
    text +
    "</div>";

  hoverPopup.style.left = (x + 10) + "px";
  hoverPopup.style.top = (y + 10) + "px";
  hoverPopup.style.border = "2px solid " + color;
  hoverPopup.style.background = "#ffffff";
  hoverPopup.style.opacity = "1";
  hoverPopup.style.display = "block";
}

function hideHoverPopup() {
  hoverPopup.style.display = "none";
}

function resetClusterPopup() {
    showClusterPlaceholder();
}
/* =========================
   HIGHLIGHT / RESET
   ========================= */
const clLinkEls = [];
const lgLinkEls = [];
const nodeEls   = {};

function highlightCluster(clusterName) {
  const activeLongs = new Set(
    linksCL.filter(l => l.source === clusterName).map(l => l.target)
  );
  const activeGemeentes = new Set(
    linksLG.filter(l => activeLongs.has(l.source)).map(l => l.target)
  );
  clLinkEls.forEach((p, i) => {
    p.setAttribute("stroke-opacity", linksCL[i].source === clusterName ? 0.75 : 0.05);
  });
  lgLinkEls.forEach((p, i) => {
    p.setAttribute("stroke-opacity", activeLongs.has(linksLG[i].source) ? 0.75 : 0.05);
  });
  Object.entries(nodeEls).forEach(([name, rect]) => {
    const active = name === clusterName || activeLongs.has(name) || activeGemeentes.has(name);
    rect.setAttribute("opacity", active ? 1 : 0.1);
  });
}

function resetHighlight() {
  clLinkEls.forEach(p => p.setAttribute("stroke-opacity", 0.35));
  lgLinkEls.forEach(p => p.setAttribute("stroke-opacity", 0.35));
  Object.values(nodeEls).forEach(r => r.setAttribute("opacity", 1));
}

/* ADDED - override wrapper, original function stays untouched */
const _resetHighlight = resetHighlight;

resetHighlight = function() {
  if (selectedCluster) {
    highlightCluster(selectedCluster);
    return;
  }
  _resetHighlight();
};

/* =========================
   OFFSETS
   ========================= */
const offsetOut = {};
const offsetIn  = {};

function initOffsets(nodeList) {
  nodeList.forEach(n => {
    offsetOut[n.name] = 0;
    offsetIn[n.name]  = 0;
  });
}

initOffsets(clusters);
initOffsets(longs);
initOffsets(gemeentes);

function totalOut(links, src) {
  return links.filter(l => l.source === src).reduce((s, l) => s + l.value, 0);
}
function totalIn(links, tgt) {
  return links.filter(l => l.target === tgt).reduce((s, l) => s + l.value, 0);
}

/* =========================
   TEXT WRAP
   ========================= */
function wrapText(text) {
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for (const w of words) {
    const candidate = line ? line + " " + w : w;
    if (candidate.length > MAX_CHARS && line) {
      lines.push(line);
      line = w;
    } else {
      line = candidate;
    }
  }
  if (line) lines.push(line);
  return lines;
}

/* =========================
   LINK DRAWING
   ========================= */
function drawLink(x1, s, x2, t, val, totS, totT, color, store) {
  const thickness = Math.max(1, Math.sqrt(val));
  const srcH = s.h * (val / (totS || 1));
  const tgtH = t.h * (val / (totT || 1));
  const y1 = s.y + offsetOut[s.name] + srcH / 2;
  const y2 = t.y + offsetIn[t.name]  + tgtH / 2;
  offsetOut[s.name] += srcH;
  offsetIn[t.name]  += tgtH;

  const p = el("path");
  const mx = (x1 + x2) / 2;
  const d = "M" + x1 + "," + y1 +
            " C" + mx + "," + y1 +
            " " + mx + "," + y2 +
            " " + x2 + "," + y2;
  p.setAttribute("d", d);
  p.setAttribute("stroke", color);
  p.setAttribute("stroke-width", thickness);
  p.setAttribute("fill", "none");
  p.setAttribute("stroke-opacity", 0.35);
  p.setAttribute("class", "link");
  svg.appendChild(p);
  store.push(p);
}

/* =========================
   NODE DRAWING
   ========================= */
function drawHeader(x, label) {
  const t = el("text");
  t.setAttribute("x", x + NODE_W / 2);
  t.setAttribute("y", HEADER_H - 8);
  t.setAttribute("text-anchor", "middle");
  t.setAttribute("class", "col-header");
  t.textContent = label;
  svg.appendChild(t);
}

function drawClusterNode(n) {
  const r = el("rect");
  r.setAttribute("x", n.x);
  r.setAttribute("y", n.y);
  r.setAttribute("width", NODE_W);
  r.setAttribute("height", n.h);
  r.setAttribute("fill", colors[n.name] || "#999");
  r.setAttribute("rx", 2);
  r.setAttribute("class", "node");

  r.addEventListener("mouseover", () => {
  if (selectedCluster && selectedCluster !== n.name) return;
  highlightCluster(n.name);
});
  r.addEventListener("mouseout", () => {
  if (!selectedCluster) resetHighlight();
  });
  r.addEventListener("click", (e) => {
  e.stopPropagation();

  selectedCluster = n.name;
  showPopup(n.name, n);
  highlightCluster(n.name);
});

  svg.appendChild(r);
  nodeEls[n.name] = r;

  const fullLabel = (clusterNames[n.name] || n.name)
    .replace(/^Cluster\s*\d+\s*[:.-]?\s*/i, "")
    .trim();
  const lines = wrapText(fullLabel);
  const lineH = 12;
  const totalTextH = lines.length * lineH;
  const startY = n.y + n.h / 2 - totalTextH / 2 + lineH * 0.75;

  lines.forEach((line, i) => {
    const t = el("text");
    t.setAttribute("x", LABEL_RIGHT);
    t.setAttribute("y", startY + i * lineH);
    t.setAttribute("class", "label");
    t.setAttribute("text-anchor", "end");
    t.textContent = line;
    svg.appendChild(t);
  });
}

function resetPopupStyle() {
  popup.style.opacity = "1";
  popup.style.filter = "none";
  popup.style.background = "#ffffff";
}
function drawLongNode(n) {
  const r = el("rect");
  r.setAttribute("x", n.x);
  r.setAttribute("y", n.y);
  r.setAttribute("width", NODE_W);
  r.setAttribute("height", n.h);
  r.setAttribute("fill", "#B0B0B0");
  r.setAttribute("rx", 2);
  r.setAttribute("class", "node");
  r.addEventListener("mouseover", (e) => {
  // 🚫 block hover if not in selected cluster
  if (selectedCluster && !isActiveLongNode(n)) return;

  const cluster = longToCluster[n.name];
  const color = colors[cluster] || "#999";

  highlightCluster(cluster);

  r.setAttribute("fill", color);
  r.setAttribute("opacity", 1);

  showTooltip(n.name, e.clientX, e.clientY, color);
});
r.addEventListener("mouseout", () => {

  if (selectedCluster && !isActiveLongNode(n)) return;

  r.setAttribute("fill", "#B0B0B0");
  r.setAttribute("opacity", 1);

  hideHoverPopup();

  if (!selectedCluster) resetHighlight();
});
  svg.appendChild(r);
  nodeEls[n.name] = r;
}

function drawGemeenteNode(n) {
  const r = el("rect");
  r.setAttribute("x", n.x);
  r.setAttribute("y", n.y);
  r.setAttribute("width", NODE_W);
  r.setAttribute("height", n.h);
  r.setAttribute("fill", "#D0D0D0");
  r.setAttribute("rx", 2);
  r.setAttribute("class", "node");
  svg.appendChild(r);
  nodeEls[n.name] = r;

  const t = el("text");
  t.setAttribute("x", n.x + 28);
  t.setAttribute("y", n.y + n.h / 2 + 4);
  t.setAttribute("class", "label");
  t.textContent = n.name;
  svg.appendChild(t);
}

/* =========================
   RENDER
   ========================= */
drawHeader(X1, "Clusters");
drawHeader(X2, "Behoeften Shortlist");
drawHeader(X3, "Gemeenten");

clusters.forEach(n  => drawClusterNode(n));
longs.forEach(n     => drawLongNode(n));
gemeentes.forEach(n => drawGemeenteNode(n));

linksCL.forEach(l => {
  const s = find(clusters, l.source);
  const t = find(longs,    l.target);
  if (!s || !t) return;
  drawLink(s.x + NODE_W, s, t.x, t, l.value,
    totalOut(linksCL, s.name), totalIn(linksCL, t.name),
    colors[s.name] || "#999", clLinkEls);
});

linksLG.forEach(l => {
  const s = find(longs,     l.source);
  const t = find(gemeentes, l.target);
  if (!s || !t) return;
  drawLink(s.x + NODE_W, s, t.x, t, l.value,
    totalOut(linksLG, s.name), totalIn(linksLG, t.name),
    colors[longToCluster[s.name]] || "#777", lgLinkEls);
});

showClusterPlaceholder();

svg.addEventListener("click", (e) => {
  // Only reset when clicking empty SVG background
  if (e.target !== svg) return;

  selectedCluster = null;

  showClusterPlaceholder();
  hideHoverPopup();

  resetHighlight();
});

</script>
