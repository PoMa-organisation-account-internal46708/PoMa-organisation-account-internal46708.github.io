// TOOLTIP
const TT = document.getElementById('tt');

function showTT(e, html){
  TT.innerHTML = html;
  TT.style.opacity = '1';
  moveTT(e);
}

function moveTT(e){
  TT.style.left = (e.clientX + 14) + 'px';
  TT.style.top = (e.clientY - 50) + 'px';
}

function hideTT(){
  TT.style.opacity = '0';
}

// SANKEY
(function(){
  const W = 1180;
  const H = 760;
  const PAD = 6;
  const NODE_W = 22;

  const X1 = 220;
  const X2 = 600;
  const X3 = 980;

  const svg = document.getElementById('sankeySvg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const clColors = {
    'C1':'#D4365A',
    'C2':'#E07020',
    'C3':'#2A8040',
    'C4':'#1A6DAF',
    'C5':'#C03030',
    'C6':'#6050B0',
    'C7':'#B07020',
    'C8':'#10908A'
  };

  function clusterLabel(code){
    const found = CLUSTERS_DATA.find(c => c.code === code);
    return found ? found.naam : code;
  }

  function clusterColor(code){
    return clColors[code] || '#888888';
  }

  const longTot = {};

  Object.values(SK_CLUSTER_LONG).forEach(longMap => {
    Object.entries(longMap).forEach(([longlist, n]) => {
      longTot[longlist] = (longTot[longlist] || 0) + n;
    });
  });

  const gemTot = {};

  Object.values(SK_LONG_GEM).forEach(gemMap => {
    Object.entries(gemMap).forEach(([gemeente, n]) => {
      gemTot[gemeente] = (gemTot[gemeente] || 0) + n;
    });
  });

  const clusterTot = {};

  Object.entries(SK_CLUSTER_LONG).forEach(([cluster, longMap]) => {
    clusterTot[cluster] = Object.values(longMap).reduce((a, b) => a + b, 0);
  });

  const grand = Object.values(clusterTot).reduce((a, b) => a + b, 0);

  function layoutNodes(items, x){
    const cleanItems = items.filter(([name, n]) => n > 0);
    const avail = H - PAD * (cleanItems.length - 1) - 60;
    let y = 30;

    return cleanItems.map(([name, n]) => {
      const h = Math.max(8, (n / grand) * avail);

      const node = {
        name,
        n,
        x,
        y,
        h,
        w: NODE_W
      };

      y += h + PAD;
      return node;
    });
  }

  const clusterItems = CL_ORDER.map(cluster => [cluster, clusterTot[cluster] || 0]);
  const longItems = LONG_ORDER.map(longlist => [longlist, longTot[longlist] || 0]);
  const gemeenteItems = GEMEENTE_ORDER.map(gemeente => [gemeente, gemTot[gemeente] || 0]);

  const clusterNodes = layoutNodes(clusterItems, X1);
  const longNodes = layoutNodes(longItems, X2);
  const gemeenteNodes = layoutNodes(gemeenteItems, X3);

  function byName(arr, name){
    return arr.find(n => n.name === name);
  }

  function truncate(label, maxLength){
    return label.length > maxLength ? label.slice(0, maxLength - 1) + '…' : label;
  }

  function ribbon(x1, y1, h1, x2, y2, h2, color, alpha, label, n){
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const mx = (x1 + x2) / 2;

    path.setAttribute(
      'd',
      `M${x1 + NODE_W},${y1} ` +
      `C${mx},${y1} ${mx},${y2} ${x2},${y2} ` +
      `L${x2},${y2 + h2} ` +
      `C${mx},${y2 + h2} ${mx},${y1 + h1} ${x1 + NODE_W},${y1 + h1} Z`
    );

    path.setAttribute('fill', color);
    path.setAttribute('opacity', alpha.toString());
    path.style.transition = 'opacity .18s';
    path.style.cursor = 'default';

    path.addEventListener('mouseenter', e => {
      path.setAttribute('opacity', '0.72');
      showTT(e, `<strong>${label}</strong>${n} behoeften`);
    });

    path.addEventListener('mousemove', moveTT);

    path.addEventListener('mouseleave', () => {
      path.setAttribute('opacity', alpha.toString());
      hideTT();
    });

    svg.insertBefore(path, svg.firstChild);
  }

  // Cluster -> Longlist offsets
  const clusterLongOffsets = {};
  const longClusterOffsets = {};

  clusterNodes.forEach(c => clusterLongOffsets[c.name] = c.y);
  longNodes.forEach(l => longClusterOffsets[l.name] = l.y);

  Object.entries(SK_CLUSTER_LONG).forEach(([cluster, longlists]) => {
    const cn = byName(clusterNodes, cluster);
    if (!cn) return;

    Object.entries(longlists).forEach(([longlist, n]) => {
      const ln = byName(longNodes, longlist);
      if (!ln || !n) return;

      const hC = cn.h * (n / cn.n);
      const hL = ln.h * (n / (longTot[longlist] || 1));

      ribbon(
        cn.x,
        clusterLongOffsets[cluster],
        hC,
        ln.x,
        longClusterOffsets[longlist],
        hL,
        clusterColor(cluster),
        0.30,
        `${clusterLabel(cluster)} → ${longlist}`,
        n
      );

      clusterLongOffsets[cluster] += hC;
      longClusterOffsets[longlist] += hL;
    });
  });

  // Longlist -> Gemeente offsets
  const longGemOffsets = {};
  const gemLongOffsets = {};

  longNodes.forEach(l => longGemOffsets[l.name] = l.y);
  gemeenteNodes.forEach(g => gemLongOffsets[g.name] = g.y);

  Object.entries(SK_LONG_GEM).forEach(([longlist, gemeenten]) => {
    const ln = byName(longNodes, longlist);
    if (!ln) return;

    Object.entries(gemeenten).forEach(([gemeente, n]) => {
      const gn = byName(gemeenteNodes, gemeente);
      if (!gn || !n) return;

      const hL = ln.h * (n / (longTot[longlist] || 1));
      const hG = gn.h * (n / (gemTot[gemeente] || 1));

      // Colour right-side ribbons by the dominant cluster linked to this longlist
      let dominantCluster = null;
      let dominantN = -1;

      Object.entries(SK_CLUSTER_LONG).forEach(([cluster, longlists]) => {
        const value = longlists[longlist] || 0;

        if (value > dominantN) {
          dominantN = value;
          dominantCluster = cluster;
        }
      });

      ribbon(
        ln.x,
        longGemOffsets[longlist],
        hL,
        gn.x,
        gemLongOffsets[gemeente],
        hG,
        clusterColor(dominantCluster),
        0.22,
        `${longlist} → ${gemeente}`,
        n
      );

      longGemOffsets[longlist] += hL;
      gemLongOffsets[gemeente] += hG;
    });
  });

  function drawNodes(nodes, colorFn, labelRight, labelFn, maxLength){
    nodes.forEach(n => {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');

      rect.setAttribute('x', n.x);
      rect.setAttribute('y', n.y);
      rect.setAttribute('width', NODE_W);
      rect.setAttribute('height', Math.max(2, n.h));
      rect.setAttribute('fill', colorFn(n.name));
      rect.setAttribute('rx', '2');
      rect.style.cursor = 'pointer';

      rect.addEventListener('mouseenter', e => {
        showTT(e, `<strong>${labelFn(n.name)}</strong>${n.n} behoeften`);
      });

      rect.addEventListener('mousemove', moveTT);
      rect.addEventListener('mouseleave', hideTT);

      svg.appendChild(rect);

      if (n.h > 6) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');

        text.setAttribute('x', labelRight ? n.x + NODE_W + 6 : n.x - 6);
        text.setAttribute('y', n.y + Math.min(n.h / 2 + 4, 14));
        text.setAttribute('text-anchor', labelRight ? 'start' : 'end');
        text.setAttribute('fill', '#1C1916');
        text.setAttribute('font-size', '10');
        text.setAttribute('font-family', 'DM Sans,sans-serif');
        text.setAttribute('pointer-events', 'none');

        const label = labelFn(n.name);
        text.textContent = truncate(label, maxLength);

        svg.appendChild(text);
      }
    });
  }

  drawNodes(
    clusterNodes,
    name => clusterColor(name),
    false,
    name => clusterLabel(name),
    34
  );

  drawNodes(
    longNodes,
    () => '#1C1916',
    false,
    name => name,
    42
  );

  drawNodes(
    gemeenteNodes,
    () => '#6B6560',
    true,
    name => name,
    28
  );

  [
    ['Strategisch cluster', X1 - 10, 'end'],
    ['Longlist / behoeften', X2 - 10, 'end'],
    ['Gemeente', X3 + NODE_W + 6, 'start']
  ].forEach(([label, x, anchor]) => {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');

    text.setAttribute('x', x);
    text.setAttribute('y', 14);
    text.setAttribute('text-anchor', anchor);
    text.setAttribute('fill', '#6B6560');
    text.setAttribute('font-size', '10');
    text.setAttribute('font-family', 'DM Sans,sans-serif');
    text.setAttribute('font-weight', '600');
    text.setAttribute('letter-spacing', '0.08em');

    text.textContent = label.toUpperCase();

    svg.appendChild(text);
  });
})();
</script>

</body>
</html>
