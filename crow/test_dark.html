<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doelgroepen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;
  --surface:#f7f8fb;
  --card:#ffffff;
  --border:#d9dee8;
  --text:#172033;
  --muted:#68738a;
  --crow2:#8b2e42;
  --green:#2f9e54;
  --blue:#3478c7;
  --orange:#c96b1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#ffffff !important;
  color:var(--text);
  min-height:100vh;
  font-family:'Inter',Arial,sans-serif;
  overflow-x:hidden;
}
body{padding:40px 48px 80px}
.view-title{
  font-family:'Syne',Arial,sans-serif;
  font-size:24px;
  font-weight:700;
  color:var(--text);
  margin-bottom:6px;
  letter-spacing:-0.02em;
}
.view-sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:36px;
  max-width:720px;
  line-height:1.7;
}
.doel-matrix{
  display:grid;
  grid-template-columns:180px 1fr 1fr 1fr;
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(23,32,51,.08);
}
.dm-header{
  background:var(--surface);
  padding:14px 16px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--muted);
}
.dm-header.status-head{text-align:center}
.dm-row-label{
  background:#ffffff;
  padding:12px 16px;
  font-size:12px;
  font-weight:600;
  color:var(--text);
  display:flex;
  align-items:center;
}
.dm-cell{
  background:#ffffff;
  padding:10px 12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  min-height:60px;
}
.dm-bubble{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 10px 4px 6px;
  font-size:11px;
  line-height:1.3;
  cursor:default;
  transition:.15s;
  color:var(--text);
}
.dm-bubble:hover{border-color:var(--crow2);background:#fafbfd}
.dm-bubble-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-Toegang{background:rgba(74,222,128,.18);border-color:rgba(47,158,84,.35)}
.st-Toegang .dm-bubble-dot{background:#2f9e54}
.st-Prioriteit{background:rgba(96,165,250,.16);border-color:rgba(52,120,199,.35)}
.st-Prioriteit .dm-bubble-dot{background:#3478c7}
.st-Weren{background:rgba(251,146,60,.17);border-color:rgba(201,107,28,.35)}
.st-Weren .dm-bubble-dot{background:#c96b1c}
@media(max-width:900px){
  body{padding:28px 20px 60px}
  .doel-matrix{display:block;background:#ffffff;border:0;box-shadow:none}
  .dm-header{display:none}
  .dm-row-label{margin-top:14px;border:1px solid var(--border);border-radius:8px 8px 0 0;background:var(--surface)}
  .dm-cell{border-left:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:44px}
  .dm-cell:before{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
  .dm-cell:nth-of-type(4n+2):before{content:'Toegang';color:#2f9e54}
  .dm-cell:nth-of-type(4n+3):before{content:'Prioriteit';color:#3478c7}
  .dm-cell:nth-of-type(4n+4):before{content:'Weren / Doseren';color:#c96b1c}
}
</style>
</head>
<body>
  <main>
     <div class="doel-matrix" id="doelMatrix"></div>
  </main>

<script>
const DOEL = [
  {g:'Amsterdam', gb:'Autoluwe zones',        rol:'Kwetsbare personen / WMO', s:'Toegang',   m:'Kwetsbaarheid wordt vergroot zonder auto'},
  {g:'Amsterdam', gb:'Autoluwe zones',        rol:'Doorgaand autoverkeer',    s:'Weren',     m:'Lokale buurtwegen zwaar belast door sluipverkeer'},
  {g:'Amsterdam', gb:'Slecht ontsloten geb.', rol:'Werknemers vitale functies',s:'Toegang',  m:'Personele schaarste in vitale sectoren'},
  {g:'Amsterdam', gb:'Stedelijke bestemmings',rol:'Beveiligd/speciaaltransport',s:'Toegang', m:'Veiligheid bij cultureel transport'},
  {g:'Amsterdam', gb:'Woonwijken',            rol:'Doorgaand sluipverkeer',   s:'Weren',     m:'Veiligheid en leefkwaliteit'},
  {g:'Almere',    gb:'Stationsomgeving',      rol:"Taxi's (Kiss & Ride)",     s:'Toegang',   m:'Faciliteren overstap van trein op taxi'},
  {g:'Almere',    gb:'Stationsomgeving',      rol:'Voetgangers',              s:'Prioriteit',m:'Verbinden groenstukken, verhogen verblijfskwaliteit'},
  {g:'Apeldoorn', gb:'Binnenstad / Centrum',  rol:'Mindervalide burgers',     s:'Toegang',   m:'Bevorderen inclusiviteit'},
  {g:'Delft',     gb:'Historisch centrum',    rol:'Regulier autoverkeer',     s:'Weren',     m:'Ruimte voor groen en verblijf'},
  {g:'Delft',     gb:'Autoluwe plusgebieden', rol:'Bewoners en vergunninghouders',s:'Toegang',m:'Geen expliciete rechtvaardiging'},
  {g:'Den Haag',  gb:'Smalle winkelstraten',  rol:'Bevoorraders / logistiek', s:'Weren',     m:'Congestie en verkeersveiligheid tijdens schoolspits'},
  {g:'Den Haag',  gb:'Woonwijken (kwetsbaar)',rol:'Arbeidsmigranten (busjes)',s:'Weren',     m:'Geluidsoverlast, parkeerdruk en zwerfafval'},
  {g:'Den Haag',  gb:'Autoluwe doorgang (Filters)',rol:"Taxi's",             s:'Weren',     m:'Verkeersschade leefbaarheid'},
  {g:'Den Haag',  gb:'Autoluwe doorgang (Filters)',rol:'Zorgverleners / mantelzorgers',s:'Weren',m:'Onderscheid zakelijk vs. privé onuitvoerbaar'},
  {g:'Den Haag',  gb:'Zero-emissiezones',     rol:'Bewoners / ondernemers',  s:'Toegang',   m:'Geen expliciete rechtvaardiging'},
  {g:'Ermelo',    gb:'Buitengebieden',        rol:'Campinggasten',            s:'Toegang',   m:'Campinggasten moeten verblijfplaats kunnen bereiken'},
  {g:'Ermelo',    gb:'Centrumgebied',         rol:'Recreatieve dagtoeristen', s:'Weren',     m:'Voorkomen toerisme in buitengebieden'},
  {g:'Groningen', gb:'Autoluwe zones',        rol:'Stadsverzorgende economie',s:'Toegang',   m:'Dagelijkse werk op korte afstand'},
  {g:'Rotterdam', gb:'Autoluwe doorgang (Filters)',rol:"Taxi's",             s:'Weren',     m:'Verkeersschade leefbaarheid'},
  {g:'Rotterdam', gb:'Autoluwe doorgang (Filters)',rol:'HoogLang vrachtverkeer',s:'Weren',  m:'Onvoldoende keermogelijkheden'},
  {g:'Tiel',      gb:'Binnenstad (Autoluw)',  rol:'Zorgverleners & mantelzorgers',s:'Prioriteit',m:'Parkeervergunningen garanderen zorg'},
  {g:'Utrecht',   gb:'Binnenstad A-zones',    rol:'Doorgaand verkeer (z.b.)', s:'Weren',    m:'Verkeersruimte schaars, verblijfskwaliteit'},
  {g:'Utrecht',   gb:'Kwetsbaar erfgoed',     rol:'Zwaar vrachtverkeer >7.5t',s:'Weren',    m:'Gevaar voor middeleeuwse werfkelders'},
  {g:'Utrecht',   gb:'Centrum',               rol:'Zware bouw- / verhuisvoertuigen',s:'Toegang',m:'Essentiële stadsfuncties garanderen'},
];

(function(){
  const gbMap = {};
  DOEL.forEach(d=>{
    if(!gbMap[d.gb]) gbMap[d.gb]={Toegang:[],Prioriteit:[],Weren:[]};
    const statusKey = Object.keys(gbMap[d.gb]).find(k=>d.s.includes(k)) || 'Toegang';
    gbMap[d.gb][statusKey].push(d);
  });

  const mat = document.getElementById('doelMatrix');
  let html = `<div class="dm-header">Gebiedstype</div>
    <div class="dm-header status-head" style="color:#2f9e54">▲ Toegang</div>
    <div class="dm-header status-head" style="color:#3478c7">● Prioriteit</div>
    <div class="dm-header status-head" style="color:#c96b1c">▼ Weren / Doseren</div>`;

  Object.entries(gbMap).forEach(([gb, statuses])=>{
    html += `<div class="dm-row-label">${gb}</div>`;
    ['Toegang','Prioriteit','Weren'].forEach(s=>{
      html += `<div class="dm-cell">`;
      (statuses[s] || []).forEach(d=>{
        html += `<div class="dm-bubble st-${s}" title="${d.m}">
          <div class="dm-bubble-dot"></div>
          <span>${d.rol}</span>
        </div>`;
      });
      html += `</div>`;
    });
  });
  mat.innerHTML = html;
})();
</script>
</body>
</html>
